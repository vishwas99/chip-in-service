name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel duplicate runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Maven verify (no integration tests yet)
        env:
          # Force tests to run with a no-op profile that doesn't need a real DB.
          # The Spring context test (`ChipInApplicationTests`) is excluded
          # until we wire Testcontainers — see PRODUCTION_READINESS.md.
          MAVEN_OPTS: -Xmx2g
        run: ./mvnw -B -ntp -DexcludedTests='ChipInApplicationTests' verify

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/

  image:
    name: Build container image (sanity)
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: chipin-service:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
