spring.application.name=ChipIn
server.port=${SERVER_PORT:8080}
server.ssl.enabled=false

# Default profile is "local"; CI/CD overrides via SPRING_PROFILES_ACTIVE.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# ---- Data source (env-driven, no committed secrets) -------------------------
# Provide via SPRING_DATASOURCE_URL / USERNAME / PASSWORD (or application-local.properties).
spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:1}
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# ---- JPA / Hibernate --------------------------------------------------------
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=chip_in_core
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ---- Flyway -----------------------------------------------------------------
spring.flyway.enabled=true
spring.flyway.schemas=chip_in_core
spring.flyway.default-schema=chip_in_core
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# ---- Session / cookies ------------------------------------------------------
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true

# ---- Logging defaults (overridden per profile) ------------------------------
logging.level.root=INFO
logging.level.com.chipIn.ChipIn=INFO

# ---- Devtools ---------------------------------------------------------------
spring.devtools.restart.enabled=false

# ---- Auth / JWT (handed off to sidecar in prod; kept for local) -------------
# 30 days in milliseconds
jwt.expiration=${JWT_EXPIRATION_MS:2592000000}
jwt.secret=${JWT_SECRET:}
chipin.security.enabled=${CHIPIN_SECURITY_ENABLED:true}

# ---- CORS -------------------------------------------------------------------
# Comma-separated origin allow-list. Empty default fails closed.
chipin.cors.allowed-origins=${CHIPIN_CORS_ALLOWED_ORIGINS:}

# ---- Email (Resend) ---------------------------------------------------------
chipin.email.provider=${CHIPIN_EMAIL_PROVIDER:mock}
chipin.email.from=${CHIPIN_EMAIL_FROM:no-reply@chipin.local}
resend.api-key=${RESEND_API_KEY:}

# ---- Frontend / invitations -------------------------------------------------
app.frontend.url=${CHIPIN_FRONTEND_URL:http://localhost:3000}
app.invitation.expiry.hours=${INVITATION_EXPIRY_HOURS:24}

# ---- Actuator (lock down further when sidecar adds authn) -------------------
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=never
management.prometheus.metrics.export.enabled=true

# ---- Springdoc / Swagger ----------------------------------------------------
# Toggle off in prod once the sidecar is gating it
springdoc.swagger-ui.enabled=${SPRINGDOC_UI_ENABLED:true}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:true}
