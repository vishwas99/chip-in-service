# Prod profile. NEVER put secrets here — always env-driven.
# Activate with SPRING_PROFILES_ACTIVE=prod.

logging.level.root=WARN
logging.level.com.chipIn.ChipIn=INFO
spring.jpa.show-sql=false

server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never
server.error.include-exception=false

# Force Swagger off in prod unless explicitly re-enabled.
springdoc.swagger-ui.enabled=${SPRINGDOC_UI_ENABLED:false}
springdoc.api-docs.enabled=${SPRINGDOC_API_DOCS_ENABLED:false}

management.endpoint.health.show-details=never

# Idempotency cleanup interval
chipin.idempotency.cleanup.cron=${CHIPIN_IDEM_CLEANUP_CRON:0 */15 * * * *}

# Daily FX refresh (06:00 UTC by default)
chipin.fx.refresh.cron=${CHIPIN_FX_REFRESH_CRON:0 0 6 * * *}
